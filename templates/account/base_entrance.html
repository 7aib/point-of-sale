{% extends "accounts/base_accounts.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <h1>{{ LOGO_TEXT }}</h1>
            <p>{{ SLOGAN }}</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% block content_inner %}{% endblock content_inner %}
    </div>
</div>
{% endblock content %}
