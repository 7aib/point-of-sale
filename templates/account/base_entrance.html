{% extends "accounts/base_accounts.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            {% if LOGO_ICON %}<img src="{{ LOGO_ICON }}" alt="{{ LOGO_TEXT }}" style="height: 56px; margin-bottom: 12px; border-radius: 12px; object-fit: cover;">{% endif %}
            <h1>{{ LOGO_TEXT }}</h1>
            <p>{{ SLOGAN }}</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% block content_inner %}{% endblock content_inner %}
    </div>
</div>
{% endblock content %}
